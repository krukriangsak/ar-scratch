<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6c5ce7">
  <title>Scratch AR Adventure v3.3</title>
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div id="cameraLayer" class="camera-layer">
    <video id="camera-video" autoplay muted playsinline></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-placeholder">📷 กดอนุญาตเพื่อเปิดกล้อง</div>
  </div>

  <div id="hand-cursor"><span id="cursor-dot"></span><span id="cursor-label">ชี้ที่นี่</span></div>
  <div id="scroll-indicator" class="hidden">↕ เลื่อนหน้า</div>
  <div id="hand-status" class="hidden"><span id="hand-status-icon">✋</span><div><b id="hand-status-title">ตรวจจับมือ</b><small id="hand-status-description">นำมือเข้ามาในภาพ</small></div></div>
  <div id="hand-guide" class="hidden">☝️ ชี้เพื่อเลือก • 🤏 หนีบเพื่อกด • ✌️ ชู 2 นิ้วแล้วเลื่อนมือขึ้น–ลงเพื่อเลื่อนหน้า</div>

  <header id="top" class="hidden top-bar">
    <b class="brand-mini">🐱 Scratch AR Adventure</b>
    <nav>
      <button data-route="home" title="หน้าแรก">🏠</button>
      <button data-route="lessons" title="บทเรียน">📚</button>
      <button data-route="adventure" title="แผนที่ด่าน">🗺️</button>
      <button data-route="leaderboard" title="อันดับ">🏆</button>
      <button data-route="profile" title="โปรไฟล์">👤</button>
      <button id="voiceBtn" title="เสียงอ่าน">🔊</button>
    </nav>
    <div class="player-mini"><span id="playerMini"></span><strong id="scoreMini">0</strong> แต้ม</div>
  </header>

  <main id="app"></main>

  <a class="admin-corner-link" href="./admin.html" aria-label="เข้าสู่ระบบผู้ดูแล">🛡️ ผู้ดูแลระบบ</a>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"></script>
  <script type="module" src="./js/app-v3.js"></script>
</body>
</html>
